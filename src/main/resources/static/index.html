<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi KTP | Ajax JQuery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 30px; }
        .card { border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .header-section { margin-bottom: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1 class="display-5 fw-bold text-primary">Sistem Informasi KTP</h1>
        <p class="text-muted">Manajemen CRUD (Ajax JQuery)</p>
    </div>

    <div class="card">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0" id="formTitle">Tambah Data Penduduk</h5>
        </div>
        <div class="card-body">
            <form id="ktpForm">
                <input type="hidden" id="ktpId"> <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label">Nomor KTP</label>
                    <input type="text" id="nomorKtp" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="namaLengkap" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Alamat</label>
                    <input type="text" id="alamat" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Tanggal Lahir</label>
                    <input type="date" id="tanggalLahir" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Jenis Kelamin</label>
                    <select id="jenisKelamin" class="form-select">
                        <option value="Laki-laki">Laki-laki</option>
                        <option value="Perempuan">Perempuan</option>
                    </select>
                </div>
                <div class="col-md-3 d-flex align-items-end">
                    <button type="submit" id="btnSubmit" class="btn btn-success w-100">Simpan Data</button>
                </div>
            </div>
            </form>
        </div>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0" id="ktpTable">
                <thead class="table-light">
                <tr>
                    <th>NIK</th>
                    <th>Nama</th>
                    <th>Alamat</th>
                    <th>Tgl Lahir</th>
                    <th>L/P</th>
                    <th>Aksi</th>
                </tr>
                </thead>
                <tbody id="ktpTableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const apiUrl = '/ktp';

    $(document).ready(function() {
        loadData();

        // 1. TUGAS 2: CREATE & UPDATE (POST & PUT)
        $('#ktpForm').on('submit', function(e) {
            e.preventDefault();

            const id = $('#ktpId').val();
            const method = id ? 'PUT' : 'POST';
            const url = id ? `${apiUrl}/${id}` : apiUrl;

            const dataKtp = {
                nomorKtp: $('#nomorKtp').val(),
                namaLengkap: $('#namaLengkap').val(),
                alamat: $('#alamat').val(),
                tanggalLahir: $('#tanggalLahir').val(),
                jenisKelamin: $('#jenisKelamin').val()
            };

            $.ajax({
                url: url,
                type: method,
                contentType: 'application/json',
                data: JSON.stringify(dataKtp),
                success: function(response) {
                    alert(id ? "Data berhasil diperbarui!" : "Data berhasil ditambahkan!");
                    resetForm();
                    loadData();
                },
                error: function(err) {
                    alert("Gagal memproses data! Periksa apakah NIK sudah terdaftar.");
                }
            });
        });
    });

    // 2. TUGAS 2: READ (GET)
    function loadData() {
        $.ajax({
            url: apiUrl,
            type: 'GET',
            success: function(data) {
                let rows = '';
                data.forEach(ktp => {
                    rows += `
                        <tr>
                            <td>${ktp.nomorKtp}</td>
                            <td>${ktp.namaLengkap}</td>
                            <td>${ktp.alamat}</td>
                            <td>${ktp.tanggalLahir}</td>
                            <td>${ktp.jenisKelamin}</td>
                            <td>
                                <button class="btn btn-warning btn-sm" onclick="editData(${ktp.id})">Edit</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteData(${ktp.id})">Hapus</button>
                            </td>
                        </tr>`;
                });
                $('#ktpTableBody').html(rows);
            }
        });
    }

    // 3. TUGAS 2: DELETE
    function deleteData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            $.ajax({
                url: `${apiUrl}/${id}`,
                type: 'DELETE',
                success: function() {
                    alert("Data berhasil dihapus!");
                    loadData();
                }
            });
        }
    }

    // Fungsi Pembantu: Mengisi Form saat Edit
    function editData(id) {
        $.get(`${apiUrl}/${id}`, function(data) {
            $('#ktpId').val(data.id);
            $('#nomorKtp').val(data.nomorKtp);
            $('#namaLengkap').val(data.namaLengkap);
            $('#alamat').val(data.alamat);
            $('#tanggalLahir').val(data.tanggalLahir);
            $('#jenisKelamin').val(data.jenisKelamin);

            $('#formTitle').text("Ubah Data Penduduk");
            $('#btnSubmit').text("Perbarui Data").removeClass('btn-success').addClass('btn-warning');
        });
    }

    function resetForm() {
        $('#ktpForm')[0].reset();
        $('#ktpId').val('');
        $('#formTitle').text("Tambah Data Penduduk");
        $('#btnSubmit').text("Simpan Data").removeClass('btn-warning').addClass('btn-success');
    }
</script>
</body>
</html>
